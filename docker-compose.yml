
services:

  mysql-container:
    image: mysql:8.0
    container_name: mysql-container
    environment:
      MYSQL_ROOT_PASSWORD: Pavan@001
      MYSQL_DATABASE: shopnest_db

    ports:
      - "3307:3306"
    volumes:
      - shopnest-mysql-data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pPavan@001"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - shopnest-network


  redis-container:
    image: redis:7.2
    container_name: redis-container
    ports:
      - "6380:6379"
    networks:
      - shopnest-network

  shopnest-app:
    build: .
    container_name: shopnest-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-container:3306/shopnest_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Pavan@001
      SPRING_DATA_REDIS_HOST: redis-container
      SPRING_DATA_REDIS_PORT: 6379

    depends_on:
        mysql-container:
          condition: service_healthy
        redis-container:
          condition: service_started

    networks:
      - shopnest-network

networks:
  shopnest-network:
    driver: bridge

volumes:
  shopnest-mysql-data:
